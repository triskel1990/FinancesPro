<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FinancesPro — Connexion</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0a0e1a; --card:#1a2238; --border:rgba(99,140,255,0.2);
  --accent:#638cff; --gold:#f4c55a; --text:#e8edf8; --text2:#8fa3cc; --text3:#5a6e94;
  --green:#34d987; --red:#ff6b6b;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;}
body::before{content:'';position:fixed;top:-20%;left:-10%;width:60%;height:60%;background:radial-gradient(ellipse,rgba(99,140,255,0.08) 0%,transparent 65%);pointer-events:none;}
body::after{content:'';position:fixed;bottom:-10%;right:-5%;width:50%;height:50%;background:radial-gradient(ellipse,rgba(244,197,90,0.06) 0%,transparent 65%);pointer-events:none;}
.container{width:100%;max-width:420px;padding:24px;position:relative;z-index:1;}
.logo{text-align:center;margin-bottom:32px;}
.logo .brand{font-family:'DM Serif Display',serif;font-size:36px;letter-spacing:-1px;}
.logo .brand span{color:var(--gold);}
.logo .sub{font-size:12px;color:var(--text3);letter-spacing:2px;text-transform:uppercase;margin-top:6px;}
.card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:32px;}
.card-title{font-size:18px;font-weight:600;margin-bottom:24px;color:var(--text2);}
.form-group{margin-bottom:16px;}
.form-label{display:block;font-size:12px;color:var(--text3);letter-spacing:1px;text-transform:uppercase;margin-bottom:6px;}
.form-input{width:100%;background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;padding:11px 14px;outline:none;transition:border-color 0.15s;}
.form-input:focus{border-color:var(--accent);}
.form-input::placeholder{color:var(--text3);}
.btn{width:100%;padding:12px;border-radius:12px;border:none;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;cursor:pointer;transition:all 0.18s;margin-top:8px;}
.btn-gold{background:linear-gradient(135deg,#c99b30,var(--gold));color:#1a1200;}
.btn-gold:hover{opacity:0.9;transform:translateY(-1px);}
.error{background:rgba(255,107,107,0.1);border:1px solid rgba(255,107,107,0.3);border-radius:10px;padding:10px 14px;font-size:13px;color:var(--red);margin-bottom:16px;display:none;}
.toggle-link{text-align:center;margin-top:16px;font-size:13px;color:var(--text3);}
.toggle-link a{color:var(--accent);cursor:pointer;text-decoration:none;}
.offline-badge{display:flex;align-items:center;gap:6px;justify-content:center;margin-top:20px;font-size:12px;color:var(--text3);}
.offline-badge .dot{width:7px;height:7px;border-radius:50%;background:var(--text3);}
.offline-badge .dot.online{background:var(--green);}
</style>
</head>
<body>
<div class="container">
  <div class="logo">
    <div class="brand">Finances<span>Pro</span></div>
    <div class="sub">Gestion Financière Personnelle</div>
  </div>

  <div class="card" id="card-login">
    <div class="card-title">Connexion à votre compte</div>
    <div class="error" id="err-login"></div>
    <div class="form-group">
      <label class="form-label">Nom d'utilisateur</label>
      <input type="text" class="form-input" id="login-user" placeholder="votre_nom" autocomplete="username">
    </div>
    <div class="form-group">
      <label class="form-label">Mot de passe</label>
      <input type="password" class="form-input" id="login-pass" placeholder="••••••••" autocomplete="current-password">
    </div>
    <button class="btn btn-gold" onclick="doLogin()">Se connecter</button>
    <div class="toggle-link">
      Pas encore de compte ? <a onclick="toggleCard()">Créer un compte</a>
    </div>
  </div>

  <div class="card" id="card-register" style="display:none">
    <div class="card-title">Créer un compte</div>
    <div class="error" id="err-register"></div>
    <div class="form-group">
      <label class="form-label">Nom d'utilisateur</label>
      <input type="text" class="form-input" id="reg-user" placeholder="votre_nom">
    </div>
    <div class="form-group">
      <label class="form-label">Email (optionnel)</label>
      <input type="email" class="form-input" id="reg-email" placeholder="vous@email.com">
    </div>
    <div class="form-group">
      <label class="form-label">Mot de passe</label>
      <input type="password" class="form-input" id="reg-pass" placeholder="••••••••">
    </div>
    <button class="btn btn-gold" onclick="doRegister()">Créer le compte</button>
    <div class="toggle-link">
      Déjà un compte ? <a onclick="toggleCard()">Se connecter</a>
    </div>
  </div>

  <div class="offline-badge">
    <div class="dot" id="conn-dot"></div>
    <span id="conn-label">Vérification de la connexion…</span>
  </div>
</div>

<script>
function toggleCard() {
  const l = document.getElementById('card-login');
  const r = document.getElementById('card-register');
  l.style.display = l.style.display === 'none' ? '' : 'none';
  r.style.display = r.style.display === 'none' ? '' : 'none';
}

async function doLogin() {
  const username = document.getElementById('login-user').value.trim();
  const password = document.getElementById('login-pass').value;
  const err = document.getElementById('err-login');
  err.style.display = 'none';
  const res = await fetch('/login', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({username, password})
  });
  const data = await res.json();
  if (data.ok) { window.location.href = '/'; }
  else { err.textContent = data.error || 'Erreur de connexion'; err.style.display = 'block'; }
}

async function doRegister() {
  const username = document.getElementById('reg-user').value.trim();
  const email = document.getElementById('reg-email').value.trim();
  const password = document.getElementById('reg-pass').value;
  const err = document.getElementById('err-register');
  err.style.display = 'none';
  const res = await fetch('/api/register', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({username, email, password})
  });
  const data = await res.json();
  if (data.ok) { toggleCard(); document.getElementById('login-user').value = username; }
  else { err.textContent = data.error || 'Erreur lors de la création'; err.style.display = 'block'; }
}

// Enter key
document.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    if (document.getElementById('card-login').style.display !== 'none') doLogin();
    else doRegister();
  }
});

// Check connectivity
function checkConn() {
  const dot = document.getElementById('conn-dot');
  const label = document.getElementById('conn-label');
  if (navigator.onLine) {
    dot.classList.add('online');
    label.textContent = 'Connecté à internet';
  } else {
    dot.classList.remove('online');
    label.textContent = 'Mode hors-ligne (local uniquement)';
  }
}
checkConn();
window.addEventListener('online', checkConn);
window.addEventListener('offline', checkConn);
</script>
</body>
</html>
